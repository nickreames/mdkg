<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">Ocean Flow demo graph map</title>
  <desc id="desc">A stylized mdkg demo workflow connecting goal, creative direction, local build, validation, and preview approval.</desc>
  <defs>
    <linearGradient id="flow" x1="80" y1="90" x2="860" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f5fd6"/>
      <stop offset="0.52" stop-color="#12aeea"/>
      <stop offset="1" stop-color="#20c7b5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f5fd6" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="980" height="620" rx="42" fill="#f7fbfd"/>
  <path d="M124 476C254 534 363 479 465 401c93-71 151-170 288-170 54 0 91 13 125 32" fill="none" stroke="url(#flow)" stroke-width="18" stroke-linecap="round" opacity="0.22"/>
  <path d="M110 182c102-77 216-71 328-18 122 58 202 153 336 126 43-9 75-26 101-48" fill="none" stroke="url(#flow)" stroke-width="12" stroke-linecap="round" opacity="0.32"/>
  <g filter="url(#soft)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g transform="translate(86 92)">
      <rect width="216" height="116" rx="18" fill="#ffffff" stroke="#cfe3ee"/>
      <text x="24" y="42" font-size="18" font-weight="760" fill="#102033">goal-1</text>
      <text x="24" y="74" font-size="15" fill="#526173">One start node</text>
      <circle cx="178" cy="58" r="20" fill="#0f5fd6"/>
      <path d="M170 58h16m-7-7 7 7-7 7" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(382 68)">
      <rect width="226" height="132" rx="18" fill="#ffffff" stroke="#cfe3ee"/>
      <text x="24" y="42" font-size="18" font-weight="760" fill="#102033">creative direction</text>
      <text x="24" y="74" font-size="15" fill="#526173">Ocean Flow plus</text>
      <text x="24" y="98" font-size="15" fill="#526173">differentiated structure</text>
      <circle cx="184" cy="68" r="22" fill="#f4c451"/>
    </g>
    <g transform="translate(676 126)">
      <rect width="220" height="122" rx="18" fill="#ffffff" stroke="#cfe3ee"/>
      <text x="24" y="42" font-size="18" font-weight="760" fill="#102033">Astro + React</text>
      <text x="24" y="74" font-size="15" fill="#526173">Static page with</text>
      <text x="24" y="98" font-size="15" fill="#526173">focused islands</text>
      <circle cx="180" cy="62" r="20" fill="#12aeea"/>
    </g>
    <g transform="translate(168 350)">
      <rect width="236" height="126" rx="18" fill="#ffffff" stroke="#cfe3ee"/>
      <text x="24" y="42" font-size="18" font-weight="760" fill="#102033">local proof</text>
      <text x="24" y="74" font-size="15" fill="#526173">Build, browser, claims,</text>
      <text x="24" y="98" font-size="15" fill="#526173">and no-secret checks</text>
      <circle cx="194" cy="64" r="21" fill="#20c7b5"/>
    </g>
    <g transform="translate(560 364)">
      <rect width="248" height="126" rx="18" fill="#ffffff" stroke="#cfe3ee"/>
      <text x="24" y="42" font-size="18" font-weight="760" fill="#102033">preview gate</text>
      <text x="24" y="74" font-size="15" fill="#526173">Approval before Vercel</text>
      <text x="24" y="98" font-size="15" fill="#526173">or public mutation</text>
      <circle cx="204" cy="64" r="21" fill="#ff7a59"/>
    </g>
